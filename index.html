<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocal Resonator</title>
  <meta name="description" content="A real-time 12-TET audio spectrum and harmonic analyzer.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  
  <div id="start-overlay">
    <div class="glass-panel">
      <h1>Vocal Resonator</h1>
      <p>Analyze your voice harmonics and resonances in real-time.</p>
      <button id="start-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
        Start Microphone
      </button>
    </div>
  </div>

  <!-- Settings Configuration UI -->
  <div id="settings-overlay" class="hidden">
    <div class="glass-panel settings-panel">
      <h2>App Configuration</h2>
      <div class="settings-grid">
        <label>Noise Gate Cutter (dB)<br><input type="range" id="cfg-noise-gate" min="-130" max="-30" step="5"></label>
        <label>Browser Smoothing<br><input type="range" id="cfg-smoothing" min="0" max="0.95" step="0.05"></label>
        <label>Peak Attack (Filter Taps)<br><input type="range" id="cfg-attack" min="0.01" max="1.0" step="0.01"></label>
        <label>Peak Release (Note Hold)<br><input type="range" id="cfg-release" min="0.01" max="0.2" step="0.01"></label>
        <label>Label Threshold<br><input type="range" id="cfg-threshold" min="0.0" max="0.5" step="0.05"></label>
        <label>Y-Offset Panning<br><input type="range" id="cfg-offset" min="-1500" max="1500" step="10"></label>
      </div>
      <button id="close-settings-btn" style="margin-top: 1.5rem; padding: 0.8rem 2.8rem;">Save & Close</button>
    </div>
  </div>
  
  <div id="app-container" class="hidden">
    <header>
      <div class="title-area">
        <h1>Resonance Analyzer</h1>
        <p class="subtitle">Peak Hold & Harmonic Detection</p>
      </div>
      <div class="controls-area">
        <div class="control-group">
          <label for="zoom-slider">Zoom:</label>
          <input type="range" id="zoom-slider" min="0.5" max="5.0" step="0.1" value="1.2">
        </div>
        <button id="toggle-sidebar" class="small-btn">Harmonics</button>
        <button id="settings-btn" class="small-btn">⚙️ Settings</button>
      </div>
    </header>
    <main>
      <div class="canvas-container" id="canvas-wrapper">
        <canvas id="spectrum-canvas"></canvas>
        <div id="labels-container"></div>
      </div>
      <div id="harmonics-sidebar">
        <h3>Detected Harmonics</h3>
        <ul id="harmonics-list"></ul>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
